<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
  <title id="title">FATE診断ロゴ</title>
  <desc id="desc">FATEの文字と4つの尺度を表す点を組み合わせたロゴ</desc>
  <defs>
    <linearGradient id="markGradient" x1="30" y1="20" x2="96" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2fa06e"/>
      <stop offset="0.48" stop-color="#d7a92f"/>
      <stop offset="1" stop-color="#855f99"/>
    </linearGradient>
  </defs>
  <rect width="360" height="96" rx="22" fill="#fff"/>
  <g transform="translate(18 12)">
    <circle cx="36" cy="36" r="32" fill="#f7f7f4" stroke="#d8dde3" stroke-width="2"/>
    <path d="M36 9l8 25 25 8-25 8-8 25-8-25-25-8 25-8z" fill="url(#markGradient)"/>
    <circle cx="36" cy="36" r="8" fill="#fff"/>
    <circle cx="14" cy="14" r="5" fill="#2fa06e"/>
    <circle cx="58" cy="14" r="5" fill="#d7a92f"/>
    <circle cx="58" cy="58" r="5" fill="#855f99"/>
    <circle cx="14" cy="58" r="5" fill="#c9412d"/>
  </g>
  <g fill="#303643">
    <text x="104" y="51" font-family="Inter, Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="38" font-weight="900" letter-spacing="3">FATE</text>
    <text x="252" y="51" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="24" font-weight="800">診断</text>
    <text x="106" y="72" font-family="Inter, Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#62666d">FASHION TYPE COMPASS</text>
  </g>
</svg>
